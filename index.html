<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Q*Bert</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      color: #fff;
      user-select: none;
    }
    #gameCanvas {
      display: block;
      border: 2px solid #333;
      image-rendering: pixelated;
    }
    #instructions {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
      text-align: center;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="600" height="560"></canvas>
  <div id="instructions">
    Q / ← &nbsp; upper-left &nbsp;|&nbsp; E / ↑ &nbsp; upper-right
    &nbsp;|&nbsp; Z / ↓ &nbsp; lower-left &nbsp;|&nbsp; C / → &nbsp; lower-right
    &nbsp;|&nbsp; SPACE / ENTER &nbsp; start
  </div>
  <script src="game.js"></script>
</body>
</html>
